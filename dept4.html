<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผอส. - แผนกอุปกรณ์เชื่อมต่อโครงข่ายสื่อสาร</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<nav>
    <a href="index.html" class="logo">PEA กสฟ.น2</a>
    <ul>
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="dept1.html">ผสม.</a></li>
        <li><a href="dept2.html">ผรผ.</a></li>
        <li><a href="dept3.html">ผปค.</a></li>
        <li><a href="dept4.html">ผอส.</a></li>
    </ul>
</nav>

<div class="container">
    <section class="dashboard-section">
        <h2><i class="fas fa-chart-pie"></i> Executive Summary Dashboard (ผปค.)</h2>
        <div class="dashboard-box">
            <iframe src="URL_DASHBOARD_ผปค_ของคุณ" style="width:100%; height:500px; border:none; border-radius:10px; background:#fff;"></iframe>
        </div>
    </section>

    <section class="upload-section" style="margin-top: 40px;">
        <div class="dept-card" style="text-align: left; border-bottom: 5px solid #27ae60;">
            <h3><i class="fas fa-cloud-upload-alt" style="color:#27ae60;"></i> อัปโหลดรายงาน/ข้อมูลใหม่</h3>
            <input type="file" id="fileInput" style="display:block; margin: 15px 0;">
            <button onclick="uploadFile()" id="btnUpload" style="background:#27ae60; color:white; padding:10px 20px; border:none; border-radius:5px; cursor:pointer;">
                <i class="fas fa-upload"></i> ส่งไฟล์เข้า Drive
            </button>
            <p id="uploadStatus" style="margin-top:10px; font-weight:bold;"></p>
        </div>
    </section>

    <section class="files-section" style="margin-top: 40px;">
        <h2><i class="fas fa-file-invoice"></i> คลังเอกสารล่าสุดใน Google Drive</h2>
        <div id="fileList" class="grid" style="margin-top: 20px;">
            <p>🔄 กำลังโหลดข้อมูลไฟล์...</p>
        </div>
    </section>
</div>

<script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwALYtD8OwS4-EAdKzEI1nXXw8uFz93JC_5GaaXfcCV5D9M6MLDMmO8pji5XVEawW_p/exec"; // URL ที่ได้จากการ Deploy
    const DEPT_ID = "dept4"; // แก้ตามแผนก: dept1, dept2, dept3, dept4

    // ฟังก์ชันโหลดรายชื่อไฟล์
    async function loadFileList() {
        try {
            const res = await fetch(`${APPS_SCRIPT_URL}?dept=${DEPT_ID}`);
            const result = await res.json();
            const container = document.getElementById('fileList');
            container.innerHTML = "";
            
            if(result.status === "success") {
                result.data.forEach(file => {
                    container.innerHTML += `
                        <div class="dept-card" style="padding:15px; text-align:left;">
                            <i class="fas fa-file-pdf" style="color:#e74c3c;"></i>
                            <h4 style="font-size:14px; margin:5px 0;">${file.name}</h4>
                            <small>วันที่: ${file.date}</small><br>
                            <a href="${file.url}" target="_blank" style="color:#632E91; font-size:12px;">เปิดดูไฟล์</a>
                        </div>
                    `;
                });
            }
        } catch (e) { console.error(e); }
    }

    // ฟังก์ชันอัปโหลดไฟล์
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('uploadStatus');
        if(!fileInput.files[0]) return alert("กรุณาเลือกไฟล์!");

        const file = fileInput.files[0];
        status.innerText = "⏳ กำลังส่งไฟล์...";
        status.style.color = "#d35400";

        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = async () => {
            const payload = {
                fileData: reader.result,
                fileName: file.name,
                mimeType: file.type,
                dept: DEPT_ID
            };
            const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status === "success") {
                status.innerText = "✅ อัปโหลดสำเร็จ!";
                status.style.color = "#27ae60";
                loadFileList(); // รีโหลดรายการไฟล์
            }
        };
    }

    window.onload = loadFileList;
</script>
</body>
</html>
