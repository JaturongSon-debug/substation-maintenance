<div class="dashboard-box" style="margin-top: 20px;">
    <h3><i class="fas fa-upload"></i> อัปโหลดไฟล์เข้าคลัง ผอส.</h3>
    <input type="file" id="fileInput" style="margin: 15px 0;">
    <button onclick="uploadFile()" style="background: #632E91; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer;">
        อัปโหลดไฟล์
    </button>
    <p id="upload-status" style="margin-top: 10px; color: #d35400;"></p>
</div>

<script>
    async function uploadFile() {
        const fileInput = document.getElementById('fileInput');
        const statusText = document.getElementById('upload-status');
        
        if (fileInput.files.length === 0) {
            statusText.innerText = "กรุณาเลือกไฟล์ก่อนอัปโหลด!";
            return;
        }

        const file = fileInput.files[0];
        statusText.innerText = "กำลังอัปโหลด... โปรดรอสักครู่";

        const reader = new FileReader();
        reader.onload = async function() {
            const payload = {
                fileData: reader.result,
                fileName: file.name,
                mimeType: file.type,
                dept: "dept4" // เปลี่ยนเป็น dept2, dept3 ตามหน้าของแผนกนั้นๆ
            };

            try {
                // อย่าลืมเปลี่ยน APPS_SCRIPT_URL เป็น URL ของคุณ
                const response = await fetch(APPS_SCRIPT_URL, {"https://script.google.com/macros/s/AKfycbwALYtD8OwS4-EAdKzEI1nXXw8uFz93JC_5GaaXfcCV5D9M6MLDMmO8pji5XVEawW_p/exec"
                    method: "POST",
                    body: JSON.stringify(payload)
                });
                const result = await response.json();
                
                if (result.status === "success") {
                    statusText.innerText = "✅ อัปโหลดไฟล์สำเร็จแล้ว! (รีเฟรชหน้าเว็บเพื่อดูไฟล์)";
                    fileInput.value = ""; // เคลียร์ช่องเลือกไฟล์
                } else {
                    statusText.innerText = "❌ เกิดข้อผิดพลาด: " + result.message;
                }
            } catch (error) {
                statusText.innerText = "❌ ไม่สามารถส่งข้อมูลได้";
            }
        };
        reader.readAsDataURL(file); // แปลงไฟล์เป็น Base64 ส่งไปให้ Google Script
    }
</script>
