<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ผสม. - Dashboard & Upload</title>
    <style>
        body { font-family: sans-serif; background: #f8f9fa; padding: 20px; }
        .box { background: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        button { background: #632E91; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <a href="index.html" style="text-decoration: none; color: #632E91;">&larr; กลับหน้าหลัก</a>
    <h2 style="color: #632E91;">แผนก ผปค. (ระบบป้องกันและควบคุม)</h2>

    <div class="box">
        <h3>📊 สรุปผลการดำเนินงาน (Dashboard)</h3>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<div style="display: flex; flex-wrap: wrap; gap: 20px; margin-top: 20px; justify-content: center;">
    
    <div style="width: 100%; max-width: 350px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center;">
        <h4 style="color: #632E91; margin-bottom: 15px;">สถานะงานบำรุงรักษา</h4>
        <canvas id="statusChart"></canvas>
    </div>

    <div style="width: 100%; max-width: 500px; background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center;">
        <h4 style="color: #632E91; margin-bottom: 15px;">สถิติงานที่ทำสำเร็จ (รายเดือน)</h4>
        <canvas id="monthChart"></canvas>
    </div>
</div>

<script>
    // ข้อมูลสำหรับกราฟวงกลม (แก้ตัวเลขตรง data ได้เลย)
    const statusData = {
        labels: ['สำเร็จ', 'กำลังดำเนินการ', 'รออะไหล่'],
        datasets: [{
            data: [45, 12, 5], // ตัวเลขจำนวนงาน
            backgroundColor: ['#27ae60', '#f1c40f', '#e74c3c'], // สี: เขียว, เหลือง, แดง
            borderWidth: 1
        }]
    };

    const configStatus = {
        type: 'doughnut',
        data: statusData,
        options: { responsive: true }
    };
    new Chart(document.getElementById('statusChart'), configStatus);

    // ข้อมูลสำหรับกราฟแท่ง (แก้ตัวเลขตรง data ได้เลย)
    const monthData = {
        labels: ['ม.ค.', 'ก.พ.', 'มี.ค.', 'เม.ย.', 'พ.ค.', 'มิ.ย.'],
        datasets: [{
            label: 'จำนวนงานที่เสร็จ (งาน)',
            data: [8, 12, 15, 7, 10, 14], // ตัวเลขงานแต่ละเดือน
            backgroundColor: '#632E91', // สีม่วง PEA
            borderRadius: 5
        }]
    };

    const configMonth = {
        type: 'bar',
        data: monthData,
        options: { 
            responsive: true,
            scales: { y: { beginAtZero: true } }
        }
    };
    new Chart(document.getElementById('monthChart'), configMonth);
</script>
    </div>

    <div class="box">
        <h3>📤 อัปโหลดข้อมูลงานใหม่ (PDF, Excel ไม่เกิน 10MB)</h3>
        <input type="file" id="fileInput" accept=".pdf, .xls, .xlsx">
        <button onclick="uploadFile()">ส่งไฟล์เข้าระบบ</button>
        <p id="statusMsg" style="color: #d35400; font-weight: bold;"></p>
    </div>

    <div class="box">
        <h3>📁 ไฟล์เอกสารในคลัง</h3>
        <ul id="fileList"><li>กำลังโหลดข้อมูล...</li></ul>
    </div>

    <script>
        // ใช้ URL Web App ของคุณ
        const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwALYtD8OwS4-EAdKzEI1nXXw8uFz93JC_5GaaXfcCV5D9M6MLDMmO8pji5XVEawW_p/exec";
        
        // *** สำคัญ: ถ้าทำหน้าแผนกอื่น ให้เปลี่ยนคำว่า dept1 เป็น dept2, dept3 หรือ dept4 ***
        const DEPT_ID = "dept3"; 

        async function loadFiles() {
            try {
                const res = await fetch(`${APPS_SCRIPT_URL}?dept=${DEPT_ID}`);
                const data = await res.json();
                const list = document.getElementById("fileList");
                list.innerHTML = "";
                if(data.status === "success") {
                    data.data.forEach(f => {
                        list.innerHTML += `<li><a href="${f.url}" target="_blank">${f.name}</a> (อัปเดต: ${f.date})</li>`;
                    });
                }
            } catch(e) { document.getElementById("fileList").innerHTML = "โหลดข้อมูลไม่สำเร็จ"; }
        }

        async function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const statusMsg = document.getElementById("statusMsg");
            const file = fileInput.files[0];
            
            if(!file) return alert("กรุณาเลือกไฟล์!");
            
            // ตรวจสอบขนาดไฟล์ไม่เกิน 10MB (10 * 1024 * 1024 bytes)
            if(file.size > 10485760) {
                statusMsg.innerText = "❌ ไฟล์ขนาดใหญ่เกิน 10MB กรุณาเลือกไฟล์ใหม่";
                statusMsg.style.color = "red";
                return;
            }

            statusMsg.innerText = "⏳ กำลังประมวลผลและอัปโหลด... ห้ามปิดหน้าจอ";
            statusMsg.style.color = "#d35400";

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const payload = { fileData: reader.result, fileName: file.name, mimeType: file.type, dept: DEPT_ID };
                try {
                    const res = await fetch(APPS_SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
                    const result = await res.json();
                    if(result.status === "success") {
                        statusMsg.innerText = "✅ บันทึกไฟล์และอัปเดตฐานข้อมูลสำเร็จ!";
                        statusMsg.style.color = "green";
                        fileInput.value = "";
                        loadFiles(); // รีเฟรชรายการไฟล์
                    } else {
                        statusMsg.innerText = "❌ Error: " + result.message;
                    }
                } catch(e) { statusMsg.innerText = "❌ การเชื่อมต่อล้มเหลว"; }
            };
        }

        window.onload = loadFiles;
    </script>
</body>
</html>
